<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .login-box { border: 1px solid #ddd; padding: 20px; width: 300px; border-radius: 8px; }
        input[type="text"], input[type="password"] { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        input[type="submit"] { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Đăng nhập</h2>
        <form action="https://quantrimang.com/account/login" method="POST">
            <label>Tên đăng nhập:</label>
            <input type="text" name="username" required>
            
            <label>Mật khẩu:</label>
            <input type="password" name="password" required>

            <input type="hidden" name="id" value="0">
            <input type="hidden" name="language" value="vi">
            <input type="hidden" name="timezone" value="GMT+7">

            <input type="submit" value="Đăng nhập">
        </form>
    </div>

</body>
</html>
