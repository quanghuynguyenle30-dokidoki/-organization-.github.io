<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <style>
        #statusBar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #eee; padding: 5px; border-top: 1px solid #ccc;
            font-size: 13px; color: #333;
        }
        body { font-family: Arial; line-height: 2; }
    </style>
</head>
<body>
    <input type="button" value="Gửi" onmousemove="show('Bạn đang di chuyển chuột vào nút Gửi')">
    
    <input type="text" name="HoTen" placeholder="Nhập họ tên" 
           onmousemove="show('Bạn đang ở trong ô nhập liệu')"> <br>

    Giới tính: 
    <input type="radio" name="GT" onmousemove="show('Chọn Nam')"> Nam
    <input type="radio" name="GT" onmousemove="show('Chọn Nữ')"> Nữ

    <div id="statusBar">Sẵn sàng</div>

    <script>
        function show(msg) {
            document.getElementById('statusBar').innerText = msg;
        }
        
        document.body.onmouseout = () => show('Sẵn sàng');
    </script>
</body>
</html>
